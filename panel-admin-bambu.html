<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Tarifario Bambu</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body{ font-family: Arial, sans-serif; background:#f5f0d6; color:#222; min-height:100vh; }
  header{ background:#1a6fb5; color:#fff; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  header h1{ font-size:18px; }
  header button{ background:#fff; color:#1a6fb5; border:none; padding:8px 14px; border-radius:8px; font-weight:bold; cursor:pointer; }
  #loginBox{ max-width:340px; margin:80px auto; background:#fff9e0; border:3px solid #1a6fb5; border-radius:14px; padding:26px; text-align:center; }
  #loginBox h2{ color:#1a6fb5; margin-bottom:16px; }
  #loginBox input{ width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:2px solid #ccc; font-size:15px; }
  #loginBox button{ width:100%; padding:11px; background:#1a6fb5; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:15px; cursor:pointer; }
  #loginError{ color:#c0392b; font-size:13px; margin-top:8px; min-height:16px; }
  main{ display:none; max-width:1100px; margin:20px auto; padding:0 14px 60px; }
  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
  .toolbar input{ padding:9px 12px; border-radius:8px; border:2px solid #1a6fb5; font-size:14px; min-width:220px; }
  .btn-primario{ background:#1a6fb5; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:bold; cursor:pointer; }
  .btn-primario:hover{ background:#145388; }
  .tabla-wrap{ overflow-x:auto; background:#fff9e0; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  table{ width:100%; border-collapse:collapse; min-width:820px; }
  th, td{ text-align:left; padding:10px 12px; border-bottom:1px solid #e5dfc0; font-size:13px; }
  th{ background:#1a6fb5; color:#fff; position:sticky; top:0; }
  tr:hover td{ background:#fff3c4; }
  .badge{ padding:4px 10px; border-radius:20px; font-size:11px; font-weight:bold; color:#fff; display:inline-block; }
  .b-activo{ background:#2e9e4a; }
  .b-prueba{ background:#e0a030; }
  .b-suspendido{ background:#e03030; }
  .b-eliminado{ background:#777; }
  .acciones{ display:flex; gap:6px; flex-wrap:wrap; }
  .acciones button{ border:none; padding:6px 10px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:bold; color:#fff; }
  .ac-editar{ background:#1a6fb5; }
  .ac-suspender{ background:#e0a030; }
  .ac-activar{ background:#2e9e4a; }
  .ac-eliminar{ background:#e03030; }
  .ac-descargar{ background:#7a4fc9; }
  .id-cell{ font-family:monospace; font-size:12px; cursor:pointer; }
  .modal-overlay{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; padding:14px; }
  .modal-box{ background:#fff9e0; border:4px solid #1a6fb5; border-radius:16px; padding:24px; width:100%; max-width:420px; max-height:90vh; overflow-y:auto; }
  .modal-box h3{ color:#1a6fb5; margin-bottom:14px; }
  .campo{ margin-bottom:12px; text-align:left; }
  .campo label{ display:block; font-size:12px; font-weight:bold; color:#333; margin-bottom:4px; }
  .campo input, .campo select, .campo textarea{ width:100%; padding:9px; border-radius:8px; border:2px solid #ccc; font-size:14px; }
  .modal-btns{ display:flex; gap:10px; margin-top:16px; }
  .modal-btns button{ flex:1; padding:11px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
  .mb-cancelar{ background:#999; color:#fff; }
  .mb-guardar{ background:#1a6fb5; color:#fff; }
  .info-vacio{ text-align:center; padding:40px; color:#888; }
  .contador-clientes{ font-size:13px; color:#555; margin-bottom:10px; }
</style>
</head>
<body>

<div id="loginBox">
  <h2>🔒 Panel Admin</h2>
  <input type="email" id="loginEmail" placeholder="Correo">
  <input type="password" id="loginPass" placeholder="Contraseña">
  <button onclick="iniciarSesion()">Entrar</button>
  <div id="loginError"></div>
</div>

<header id="header" style="display:none;">
  <h1>🎋 Panel Admin — Tarifario Bambu</h1>
  <button onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<main id="main">
  <div class="toolbar">
    <input type="text" id="buscadorClientes" placeholder="Buscar cliente..." oninput="renderTabla()">
    <button class="btn-primario" onclick="abrirModal()">+ Nuevo cliente</button>
  </div>
  <div class="contador-clientes" id="contador"></div>
  <div class="tabla-wrap">
    <table>
      <thead>
        <tr>
          <th>ID Cliente</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Estado</th>
          <th>Días rest.</th>
          <th>Último acceso</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitulo">Nuevo cliente</h3>
    <div class="campo">
      <label>ID de cliente (sin espacios, ej: bambu_002)</label>
      <input type="text" id="fId" placeholder="bambu_002">
    </div>
    <div class="campo">
      <label>Nombre</label>
      <input type="text" id="fNombre" placeholder="Nombre del cliente">
    </div>
    <div class="campo">
      <label>Teléfono</label>
      <input type="text" id="fTelefono" placeholder="9XXXXXXXX">
    </div>
    <div class="campo">
      <label>Estado</label>
      <select id="fEstado">
        <option value="prueba">Prueba</option>
        <option value="activo">Activo</option>
        <option value="suspendido">Suspendido</option>
        <option value="eliminado">Eliminado</option>
      </select>
    </div>
    <div class="campo" id="campoDias">
      <label>Días de prueba</label>
      <input type="number" id="fDias" value="15" min="1">
    </div>
    <div class="campo">
      <label>Notas (opcional)</label>
      <textarea id="fNotas" rows="2"></textarea>
    </div>
    <div class="modal-btns">
      <button class="mb-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="mb-guardar" onclick="guardarCliente()">Guardar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDAbvyX5FeZF3EQT5yLzIS8NGKq6pr8M1E",
  authDomain: "mototaxibambu.firebaseapp.com",
  projectId: "mototaxibambu",
  storageBucket: "mototaxibambu.firebasestorage.app",
  messagingSenderId: "838801357510",
  appId: "1:838801357510:web:d96dfc7027c598e9b8f5c7"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let clientes = [];
let editandoId = null;

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('header').style.display = 'flex';
    document.getElementById('main').style.display = 'block';
    escucharClientes();
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('header').style.display = 'none';
    document.getElementById('main').style.display = 'none';
  }
});

function iniciarSesion(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent = '';
  auth.signInWithEmailAndPassword(email, pass).catch(err => {
    document.getElementById('loginError').textContent = 'Correo o contraseña incorrectos.';
  });
}
function cerrarSesion(){ auth.signOut(); }

let unsub = null;
function escucharClientes(){
  if(unsub) unsub();
  unsub = db.collection('clientes').orderBy('fechaCreacion', 'desc').onSnapshot(snap => {
    clientes = [];
    snap.forEach(doc => clientes.push({ id: doc.id, ...doc.data() }));
    renderTabla();
  }, err => {
    console.log('error escuchando clientes', err);
  });
}

function diasRestantes(c){
  if(c.estado !== 'prueba') return '-';
  const dias = c.diasPrueba || 15;
  const inicio = c.fechaInicioPrueba ? c.fechaInicioPrueba.toMillis() : Date.now();
  const pasados = (Date.now() - inicio) / 86400000;
  const rest = Math.max(0, Math.ceil(dias - pasados));
  return rest + ' día(s)';
}
function formatoFecha(ts){
  if(!ts) return 'Nunca';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-PE') + ' ' + d.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'});
}

function renderTabla(){
  const filtro = document.getElementById('buscadorClientes').value.trim().toUpperCase();
  const lista = filtro ? clientes.filter(c =>
    (c.nombre||'').toUpperCase().includes(filtro) ||
    (c.id||'').toUpperCase().includes(filtro) ||
    (c.telefono||'').toUpperCase().includes(filtro)
  ) : clientes;

  document.getElementById('contador').textContent = lista.length + ' cliente(s)';
  const tbody = document.getElementById('tbody');
  if(!lista.length){
    tbody.innerHTML = '<tr><td colspan="7"><div class="info-vacio">No hay clientes todavía. Crea el primero con "+ Nuevo cliente".</div></td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(c => `
    <tr>
      <td class="id-cell" title="Clic para copiar" onclick="copiarId('${c.id}')">${c.id}</td>
      <td>${c.nombre||'-'}</td>
      <td>${c.telefono||'-'}</td>
      <td><span class="badge b-${c.estado}">${c.estado}</span></td>
      <td>${diasRestantes(c)}</td>
      <td>${formatoFecha(c.ultimoAcceso)}</td>
      <td>
        <div class="acciones">
          <button class="ac-editar" onclick="abrirModal('${c.id}')">Editar</button>
          ${c.estado === 'suspendido'
            ? `<button class="ac-activar" onclick="cambiarEstado('${c.id}','activo')">Activar</button>`
            : `<button class="ac-suspender" onclick="cambiarEstado('${c.id}','suspendido')">Suspender</button>`
          }
          <button class="ac-eliminar" onclick="eliminarCliente('${c.id}')">Eliminar</button>
          <button class="ac-descargar" onclick="descargarTarifario('${c.id}')">📥 Tarifario</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function copiarId(id){
  navigator.clipboard.writeText(id).then(() => alert('ID copiado: ' + id));
}

function cambiarEstado(id, estado){
  db.collection('clientes').doc(id).update({ estado }).catch(err => alert('Error: ' + err.message));
}

function eliminarCliente(id){
  if(!confirm('¿Seguro que quieres ELIMINAR al cliente "' + id + '"? Esta acción no se puede deshacer.')) return;
  db.collection('clientes').doc(id).delete().catch(err => alert('Error: ' + err.message));
}

function abrirModal(id){
  editandoId = id || null;
  document.getElementById('modalTitulo').textContent = id ? 'Editar cliente' : 'Nuevo cliente';
  const fId = document.getElementById('fId');
  if(id){
    const c = clientes.find(x => x.id === id);
    fId.value = c.id; fId.disabled = true;
    document.getElementById('fNombre').value = c.nombre || '';
    document.getElementById('fTelefono').value = c.telefono || '';
    document.getElementById('fEstado').value = c.estado || 'prueba';
    document.getElementById('fDias').value = c.diasPrueba || 15;
    document.getElementById('fNotas').value = c.notas || '';
  } else {
    fId.value = 'bambu_' + Math.floor(1000 + Math.random()*9000);
    fId.disabled = false;
    document.getElementById('fNombre').value = '';
    document.getElementById('fTelefono').value = '';
    document.getElementById('fEstado').value = 'prueba';
    document.getElementById('fDias').value = 15;
    document.getElementById('fNotas').value = '';
  }
  document.getElementById('modalOverlay').style.display = 'flex';
}
function cerrarModal(){ document.getElementById('modalOverlay').style.display = 'none'; }

function guardarCliente(){
  const id = document.getElementById('fId').value.trim().replace(/\s+/g, '_');
  const nombre = document.getElementById('fNombre').value.trim();
  const telefono = document.getElementById('fTelefono').value.trim();
  const estado = document.getElementById('fEstado').value;
  const diasPrueba = parseInt(document.getElementById('fDias').value) || 15;
  const notas = document.getElementById('fNotas').value.trim();

  if(!id){ alert('El ID de cliente es obligatorio.'); return; }

  if(editandoId){
    const data = { nombre, telefono, estado, diasPrueba, notas };
    db.collection('clientes').doc(editandoId).update(data)
      .then(() => cerrarModal())
      .catch(err => alert('Error: ' + err.message));
  } else {
    db.collection('clientes').doc(id).get().then(snap => {
      if(snap.exists){ alert('Ya existe un cliente con ese ID. Usa otro.'); return; }
      const data = {
        nombre, telefono, estado, diasPrueba, notas,
        fechaCreacion: firebase.firestore.FieldValue.serverTimestamp(),
        fechaInicioPrueba: firebase.firestore.FieldValue.serverTimestamp(),
        ultimoAcceso: null
      };
      db.collection('clientes').doc(id).set(data)
        .then(() => cerrarModal())
        .catch(err => alert('Error: ' + err.message));
    });
  }
}

function descargarTarifario(id) {
  try {
    const html = decodeURIComponent(escape(window.atob(TARIFARIO_TEMPLATE_B64)));
    const htmlConId = html.replace('__CLIENT_ID__', id);
    const blob = new Blob([htmlConId], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tarifario_' + id + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Error generando el archivo: ' + e.message);
  }
}

document.getElementById('fEstado').addEventListener('change', function(){
  document.getElementById('campoDias').style.display = this.value === 'prueba' ? 'block' : 'none';
});
</script>
